services:
  buscador:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Garante que o SQLite escreva dentro do volume persistido abaixo,
      # independente do que estiver em DATABASE_URL no .env local.
      - DATABASE_URL=sqlite:////app/data/buscador_processos.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
