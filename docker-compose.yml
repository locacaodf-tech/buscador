services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buscador
      POSTGRES_PASSWORD: buscador_dev_local
      POSTGRES_DB: buscador_processos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buscador"]
      interval: 10s
      timeout: 5s
      retries: 5

  buscador:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://buscador:buscador_dev_local@db:5432/buscador_processos
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
