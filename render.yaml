databases:
  - name: buscador-postgres
    plan: free  # ATENÇÃO: Postgres free do Render é apagado 30 dias após criado.
                # Para produção real, troque para 'basic' ou superior (pago).

services:
  - type: web
    name: buscador-processos
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: buscador-postgres
          property: connectionString
      - key: DATAJUD_API_KEY
        sync: false  # opcional: em branco usa a chave pública oficial embutida em app/config.py
      - key: DATAJUD_BASE_URL
        value: https://api-publica.datajud.cnj.jus.br
      - key: INTERNAL_API_TOKEN
        sync: false  # opcional: pra cron/scripts externos chamarem a API sem sessão
      - key: INDICE_CPF_HASH_SALT
        generateValue: true  # salt do hash de CPF/CNPJ do índice — precisa ser secreto e estável
      - key: CAMPAIGN_SENDING_ENABLED
        value: false
      - key: STJ_UPLOAD_DIR
        value: data/stj_uploads
      - key: EVIDENCE_UPLOAD_DIR
        value: data/evidencias_manuais
      - key: SESSION_TTL_DAYS
        value: 90
