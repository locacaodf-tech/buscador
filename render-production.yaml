services:
  - type: web
    name: buscador-processos
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/buscador_processos.db
      - key: DATAJUD_API_KEY
        sync: false  # opcional: deixe em branco pra usar a chave publica oficial ja embutida em app/config.py
      - key: DATAJUD_BASE_URL
        value: https://api-publica.datajud.cnj.jus.br
      - key: JUDIT_ENABLED
        value: false
      - key: JUDIT_API_KEY
        sync: false
      - key: JUDIT_REQUESTS_BASE_URL
        value: https://requests.production.judit.io
      - key: JUDIT_TRACKING_BASE_URL
        value: https://tracking.production.judit.io
      - key: JUDIT_LAWSUITS_BASE_URL
        value: https://lawsuits.production.judit.io
      - key: JUDIT_NAME_SEARCH_TYPE
        value: name
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: APP_LOGIN_PASSWORD
        sync: false
      - key: STJ_UPLOAD_DIR
        value: /data/stj_uploads
      - key: SESSION_TTL_DAYS
        value: 90
    disk:
      name: buscador-data
      mountPath: /data
      sizeGB: 1
