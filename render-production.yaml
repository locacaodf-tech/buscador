databases:
  - name: buscador-postgres-prod
    plan: basic-256mb  # plano pago — Postgres persistente de verdade (não expira como o free)

services:
  - type: web
    name: buscador-processos
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: buscador-postgres-prod
          property: connectionString
      - key: DATAJUD_API_KEY
        sync: false
      - key: DATAJUD_BASE_URL
        value: https://api-publica.datajud.cnj.jus.br
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: INDICE_CPF_HASH_SALT
        generateValue: true
      - key: CAMPAIGN_SENDING_ENABLED
        value: false
      - key: STJ_UPLOAD_DIR
        value: /data/stj_uploads
      - key: EVIDENCE_UPLOAD_DIR
        value: /data/evidencias_manuais
      - key: SESSION_TTL_DAYS
        value: 90
    disk:
      name: buscador-data
      mountPath: /data
      sizeGB: 1
